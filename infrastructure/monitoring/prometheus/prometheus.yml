global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'secaudit-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

# Note: scraping Postgres directly on 5432 will send HTTP requests to the Postgres TCP
# port and generate 'invalid length of startup packet' logs in Postgres. Remove or
# replace this scrape with a PostgreSQL exporter endpoint (e.g. postgres_exporter:9187)
# if you add one.
